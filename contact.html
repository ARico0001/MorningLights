<body class="bg-slate-50 text-slate-800 font-sans antialiased flex flex-col min-h-screen">

    <nav class="bg-slate-900 text-white border-b border-slate-800 sticky top-0 z-50 shadow-md">
        <div class="max-w-6xl mx-auto px-6 h-20 flex items-center justify-between">

                <a href="index.html" class="text-slate-300 hover:text-blue-400 transition">Home</a>

                <a href="contact.html" class="text-blue-400 border-b-2 border-blue-400 pb-1">Contact Us</a>
            </div>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-6 py-16 flex-grow w-full space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight uppercase">Let's Connect</h1>
            <p class="text-slate-500 text-sm">Fill out the form below to get your initial 15-minute Tech Health Check consultation.</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
            <form action="https://api.web3forms.com/submit" method="POST" class="space-y-5">

                <input type="hidden" name="access_key" value="377110d8-307b-44da-b4a1-19024cf4e218">

                <input type="hidden" name="redirect" value="https://www.morninglightsolutions.com/index.html">

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Your Name</label>
                    <input type="text" name="name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-hidden focus:border-blue-500 focus:bg-white transition">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Email Address</label>
                    <input type="email" name="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-hidden focus:border-blue-500 focus:bg-white transition">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-600 uppercase tracking-wider">Message</label>
                    <textarea name="message" rows="5" required placeholder="Tell us about your workstations, network setup..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-hidden focus:border-blue-500 focus:bg-white transition resize-none"></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl uppercase tracking-wider text-xs shadow-md transition cursor-pointer">
                    Submit
                </button>
            </form>
        </div>
